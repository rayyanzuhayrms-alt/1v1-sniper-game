<!DOCTYPE html>
<html>
<head>
  <title>1v1 Sniper</title>
</head>
<body>
  <h1>1v1 Sniper Game</h1>
  <p>Open this link on 2 devices to play</p>

  <canvas id="game" width="400" height="400" style="border:1px solid black;"></canvas>

  <script>
    const ws = new WebSocket(`ws://${location.host}`);
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let player = { x: 50, y: 50 };
    let enemy = { x: 200, y: 200 };

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") player.y -= 5;
      if (e.key === "ArrowDown") player.y += 5;
      if (e.key === "ArrowLeft") player.x -= 5;
      if (e.key === "ArrowRight") player.x += 5;

      ws.send(JSON.stringify(player));
    });

    ws.onmessage = (msg) => {
      enemy = JSON.parse(msg.data);
    };

    function draw() {
      ctx.clearRect(0, 0, 400, 400);

      ctx.fillStyle = "blue";
      ctx.fillRect(player.x, player.y, 20, 20);

      ctx.fillStyle = "red";
      ctx.fillRect(enemy.x, enemy.y, 20, 20);

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
